version: '3.8'

services:
  # --- Infrastructure: Kafka & Zookeeper ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: smartbar-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - smartbar-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: smartbar-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - smartbar-network

  # --- Database: PostgreSQL ---
  smartbar-db:
    image: postgres:15
    container_name: smartbar-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: barpassword123
    ports:
      - "5455:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - smartbar-network

  # --- Microservices ---
  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    container_name: smartbar-inventory-service
    ports:
      - "7042:8080"
      - "7043:8081"
    environment:
      - ConnectionStrings__DefaultConnection=Host=smartbar-postgres;Port=5432;Database=InventoryDb;Username=admin;Password=barpassword123
      - ASPNETCORE_ENVIRONMENT=Development
      - Kestrel__Endpoints__http__Url=http://+:8080
      - Kestrel__Endpoints__http__Protocols=Http1AndHttp2
      - Kestrel__Endpoints__grpc__Url=http://+:8081
      - Kestrel__Endpoints__grpc__Protocols=Http2
    depends_on:
      - smartbar-db
    networks:
      - smartbar-network

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    container_name: smartbar-order-service
    ports:
      - "7224:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=smartbar-postgres;Port=5432;Database=OrderDb;Username=admin;Password=barpassword123
      - GrpcUrls__InventoryService=http://smartbar-inventory-service:8081
      - ASPNETCORE_ENVIRONMENT=Development
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - smartbar-db
      - inventory-service
    networks:
      - smartbar-network

  bar-service:
    build:
      context: .
      dockerfile: src/BarService/Dockerfile
    container_name: smartbar-bar-service
    ports:
      - "7026:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=smartbar-postgres;Port=5432;Database=BarDb;Username=admin;Password=barpassword123
      - ASPNETCORE_ENVIRONMENT=Development
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - smartbar-db
    networks:
      - smartbar-network

  notification-service:
    build:
      context: .
      dockerfile: src/NotificationService/Dockerfile
    container_name: smartbar-notification-service
    ports:
      - "7081:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=smartbar-postgres;Port=5432;Database=NotificationDb;Username=admin;Password=barpassword123
      - ASPNETCORE_ENVIRONMENT=Development
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - smartbar-db
    networks:
      - smartbar-network

networks:
  smartbar-network:
    driver: bridge

volumes:
  db-data:
