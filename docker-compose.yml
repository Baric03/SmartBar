version: '3.8'

services:
  # --- Infrastructure: Kafka & Zookeeper ---
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: smartbar-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - smartbar-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: smartbar-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - smartbar-network

  # --- Database: PostgreSQL ---
  smartbar-db:
    image: postgres:15
    container_name: smartbar-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: barpassword123
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - smartbar-network

networks:
  smartbar-network:
    driver: bridge

volumes:
  db-data:
