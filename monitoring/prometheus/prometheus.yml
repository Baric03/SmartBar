# =============================================================================
# Prometheus Configuration for SmartBar
# Scrapes metrics from all 4 microservices at /metrics endpoint.
# =============================================================================

global:
  scrape_interval: 15s       # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules

scrape_configs:
  - job_name: 'order-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['smartbar-order-service:8080']
        labels:
          service: 'order-service'

  - job_name: 'inventory-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['smartbar-inventory-service:8080']
        labels:
          service: 'inventory-service'

  - job_name: 'bar-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['smartbar-bar-service:8080']
        labels:
          service: 'bar-service'

  - job_name: 'notification-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['smartbar-notification-service:8080']
        labels:
          service: 'notification-service'
