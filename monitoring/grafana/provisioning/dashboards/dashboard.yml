# Auto-provisions dashboards from the /var/lib/grafana/dashboards directory.
apiVersion: 1

providers:
  - name: 'SmartBar Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
