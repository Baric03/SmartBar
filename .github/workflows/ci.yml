# =============================================================================
# SmartBar CI Pipeline
# Triggers on every push/PR to main and dev branches.
# Jobs: Build → Test → SonarCloud Analysis → Docker Image Build
# =============================================================================

name: SmartBar CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ===========================================================================
  # Job 1: Build & Test
  # Restores, builds, and runs all unit tests. Produces test results as artifacts.
  # ===========================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SmartBar.sln

      - name: Build solution
        run: dotnet build SmartBar.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test Tests/OrderService.UnitTests/OrderService.UnitTests.csproj --configuration Release --no-build --logger "trx;LogFileName=order-tests.trx" --results-directory ./TestResults
          dotnet test Tests/InventoryService.UnitTests/InventoryService.UnitTests.csproj --configuration Release --no-build --logger "trx;LogFileName=inventory-tests.trx" --results-directory ./TestResults
          dotnet test Tests/BarService.UnitTests/BarService.UnitTests.csproj --configuration Release --no-build --logger "trx;LogFileName=bar-tests.trx" --results-directory ./TestResults
          dotnet test Tests/NotificationService.UnitTests/NotificationService.UnitTests.csproj --configuration Release --no-build --logger "trx;LogFileName=notification-tests.trx" --results-directory ./TestResults

      - name: Start Services for E2E Tests
        run: docker compose up -d --wait

      - name: Run E2E Tests
        run: dotnet test Tests/SmartBar.E2E.Tests/SmartBar.E2E.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=e2e-tests.trx" --results-directory ./TestResults

      - name: Tear Down Services
        if: always()
        run: docker compose down -v

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx

  # ===========================================================================
  # Job 2: SonarCloud Static Code Analysis
  # Runs the dotnet-sonarscanner to continuously inspect code quality.
  # This automated tool statically analyzes the codebase and checks for:
  #   - Code Smells (Maintainability issues)
  #   - Potential Bugs (Reliability issues)
  #   - Security Issues / Vulnerabilities (Security hotspots)
  # Uses SonarCloud's official recommended configuration for .NET.
  # Requires SONAR_TOKEN secret to be configured in GitHub repo settings.
  # ===========================================================================
  sonar-analysis:
    name: SonarCloud Analysis
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for accurate SonarCloud analysis

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Build and Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"Baric03_SmartBar" /o:"baric03" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.coverage.exclusions="**/Program.cs" /d:sonar.cpd.exclusions="**/Program.cs"
          dotnet build SmartBar.sln --configuration Release
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

  # ===========================================================================
  # Job 3: Detect Changed Services
  # Compares against the base branch to determine which services have changes.
  # Outputs boolean flags so downstream jobs only build what's needed.
  # ===========================================================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      order-service: ${{ steps.changes.outputs.order-service }}
      inventory-service: ${{ steps.changes.outputs.inventory-service }}
      bar-service: ${{ steps.changes.outputs.bar-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes per service
        id: changes
        run: |
          # On PRs, compare against the base branch. On pushes, compare against the previous commit.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          CHANGED_FILES=$(git diff --name-only $BASE_SHA ${{ github.sha }} || echo "")

          check_changes() {
            local service_path=$1
            if echo "$CHANGED_FILES" | grep -q "^${service_path}/"; then
              echo "true"
            else
              echo "false"
            fi
          }

          echo "order-service=$(check_changes 'src/OrderService')" >> $GITHUB_OUTPUT
          echo "inventory-service=$(check_changes 'src/InventoryService')" >> $GITHUB_OUTPUT
          echo "bar-service=$(check_changes 'src/BarService')" >> $GITHUB_OUTPUT
          echo "notification-service=$(check_changes 'src/NotificationService')" >> $GITHUB_OUTPUT

          echo "--- Changed files ---"
          echo "$CHANGED_FILES"

  # ===========================================================================
  # Job 4: Build Docker Images (Path-Aware)
  # Only builds Docker images for services that have file changes.
  # Images are NOT pushed — that will be handled by the CD pipeline (Phase 5).
  # ===========================================================================
  docker-build-order:
    name: Docker Build — Order Service
    runs-on: ubuntu-latest
    needs: [build-and-test, detect-changes]
    if: needs.detect-changes.outputs.order-service == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f src/OrderService/Dockerfile -t smartbar/order-service:${{ github.sha }} .

  docker-build-inventory:
    name: Docker Build — Inventory Service
    runs-on: ubuntu-latest
    needs: [build-and-test, detect-changes]
    if: needs.detect-changes.outputs.inventory-service == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f src/InventoryService/Dockerfile -t smartbar/inventory-service:${{ github.sha }} .

  docker-build-bar:
    name: Docker Build — Bar Service
    runs-on: ubuntu-latest
    needs: [build-and-test, detect-changes]
    if: needs.detect-changes.outputs.bar-service == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f src/BarService/Dockerfile -t smartbar/bar-service:${{ github.sha }} .

  docker-build-notification:
    name: Docker Build — Notification Service
    runs-on: ubuntu-latest
    needs: [build-and-test, detect-changes]
    if: needs.detect-changes.outputs.notification-service == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f src/NotificationService/Dockerfile -t smartbar/notification-service:${{ github.sha }} .
